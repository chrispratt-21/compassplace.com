<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — Compass Place</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --color-bg: #FAFAF7; --color-primary: #2B5F4E; --color-text-secondary: #6B6B6B; --color-border: #E5E2DC; --font-display: 'DM Serif Display', Georgia, serif; --font-body: 'DM Sans', -apple-system, sans-serif; }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-body); color: #2C2C2C; background: var(--color-bg); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 24px; }
        h1 { font-family: var(--font-display); font-size: 2.2rem; color: var(--color-primary); margin-bottom: 12px; }
        p { color: var(--color-text-secondary); margin-bottom: 24px; font-size: 1.05rem; }
        a { display: inline-block; background: var(--color-primary); color: #fff; text-decoration: none; padding: 12px 28px; border-radius: 8px; font-weight: 600; transition: background 0.2s; }
        a:hover { background: #3A7D66; }
    </style>
</head>
<body>
    <h1>Page not found</h1>
    <p>Sorry, we couldn't find the page you're looking for.</p>
    <a href="/">Back to Home</a>
</body>
</html>
